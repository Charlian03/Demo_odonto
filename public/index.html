<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OdontoPrime - Recepcao</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #0b141a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .phone-frame {
      width: 440px;
      height: 92vh;
      max-height: 780px;
      background: #0b141a;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 60px rgba(0,0,0,0.6);
      border: 1.5px solid #1f2c34;
    }

    /* Header */
    .header {
      background: #1f2c34;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a3942;
    }

    .back-arrow {
      color: #00a884;
      font-size: 20px;
      cursor: pointer;
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #29b6f6, #0288d1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 13px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }

    .header-info h3 {
      color: #e9edef;
      font-size: 15px;
      font-weight: 600;
    }

    .header-info .status {
      font-size: 12px;
      color: #8696a0;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00a884;
      display: inline-block;
    }

    .header-actions {
      display: flex;
      gap: 16px;
    }

    .header-actions svg {
      width: 22px;
      height: 22px;
      fill: #8696a0;
      cursor: pointer;
    }

    /* Chat */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px 14px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: #0b141a;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 15 L30 12 L25 15Z' fill='%23111b21' opacity='0.3'/%3E%3C/svg%3E");
    }

    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: #374045; border-radius: 10px; }

    .date-divider {
      text-align: center;
      margin: 12px 0 8px;
    }

    .date-divider span {
      background: #1b2831;
      color: #8696a0;
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 8px;
    }

    .msg-wrapper {
      display: flex;
      flex-direction: column;
      animation: msgIn 0.25s ease;
    }

    .msg-wrapper.user { align-items: flex-end; }
    .msg-wrapper.bot { align-items: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .msg {
      max-width: 82%;
      padding: 7px 10px 4px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }

    .msg.bot {
      background: #1f2c34;
      color: #e9edef;
      border-top-left-radius: 2px;
    }

    .msg.user {
      background: #01579b;
      color: #e9edef;
      border-top-right-radius: 2px;
    }

    .msg .meta {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }

    .msg .time {
      font-size: 11px;
      color: rgba(134, 150, 160, 0.8);
    }

    .msg.user .time { color: rgba(255,255,255,0.5); }

    .read-ticks {
      font-size: 14px;
      color: #53bdeb;
      line-height: 1;
    }

    /* Typing */
    .typing-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 0;
      animation: msgIn 0.2s ease;
    }

    .typing-bubble {
      background: #1f2c34;
      padding: 10px 16px;
      border-radius: 8px;
      border-top-left-radius: 2px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px;
      height: 7px;
      background: #8696a0;
      border-radius: 50%;
      animation: typeDot 1.4s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typeDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input */
    .input-area {
      background: #1f2c34;
      padding: 8px 10px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      border-top: 1px solid #2a3942;
    }

    .input-box {
      flex: 1;
      background: #2a3942;
      border: none;
      border-radius: 22px;
      padding: 10px 16px;
      color: #e9edef;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      min-height: 42px;
      line-height: 1.4;
      overflow-y: auto;
    }

    .input-box::placeholder { color: #8696a0; }

    .send-btn {
      background: #0288d1;
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .send-btn:hover { background: #039be5; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #2a3942; cursor: default; transform: none; }

    .send-btn svg {
      fill: #fff;
      width: 20px;
      height: 20px;
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 6px 10px 2px;
      background: #1f2c34;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .quick-actions::-webkit-scrollbar { display: none; }

    .quick-chip {
      background: transparent;
      border: 1px solid #2a3942;
      color: #00a884;
      padding: 6px 14px;
      border-radius: 18px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .quick-chip:hover {
      background: #00a88415;
      border-color: #00a884;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .phone-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        max-height: 100vh;
        max-height: 100dvh;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="header">
    <span class="back-arrow">&#8249;</span>
    <div class="header-avatar">ODP</div>
    <div class="header-info">
      <h3>Clinica OdontoPrime</h3>
      <div class="status" id="statusBar">
        <span class="status-dot"></span>
        <span>online</span>
      </div>
    </div>
    <div class="header-actions">
      <svg viewBox="0 0 24 24"><path d="M15.9 14.3H15l-.3-.3c1-1.1 1.6-2.7 1.6-4.3 0-3.7-3-6.7-6.7-6.7S3 6 3 9.7s3 6.7 6.7 6.7c1.6 0 3.2-.6 4.3-1.6l.3.3v.8l5.1 5.1 1.5-1.5-5-5.2zm-6.2 0c-2.6 0-4.6-2.1-4.6-4.6s2.1-4.6 4.6-4.6 4.6 2.1 4.6 4.6-2 4.6-4.6 4.6z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M12 7a2 2 0 1 0-.001-4.001A2 2 0 0 0 12 7zm0 2a2 2 0 1 0-.001 3.999A2 2 0 0 0 12 9zm0 6a2 2 0 1 0-.001 3.999A2 2 0 0 0 12 15z"/></svg>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="date-divider"><span>Hoje</span></div>
  </div>



  <div class="input-area">
    <textarea class="input-box" id="userInput" placeholder="Mensagem" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusBar = document.getElementById('statusBar');

const sessionId = 'session_' + Math.random().toString(36).substring(2, 10);
let isWaiting = false;

const timeStr = () => new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
}

input.addEventListener('input', autoResize);
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(text, sender) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${sender}`;

  const msg = document.createElement('div');
  msg.className = `msg ${sender}`;

  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const formatted = escaped.replace(/\n/g, '<br>');

  let meta = `<div class="meta"><span class="time">${timeStr()}</span>`;
  if (sender === 'user') meta += `<span class="read-ticks">&#10003;&#10003;</span>`;
  meta += '</div>';

  msg.innerHTML = formatted + meta;
  wrapper.appendChild(msg);
  chat.appendChild(wrapper);
  scrollToBottom();
}

function showTyping() {
  const wrapper = document.createElement('div');
  wrapper.className = 'typing-wrapper';
  wrapper.id = 'typingIndicator';

  wrapper.innerHTML = `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
  chat.appendChild(wrapper);
  scrollToBottom();

  statusBar.innerHTML = '<span style="color:#00a884; font-size:12px;">digitando...</span>';
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
  statusBar.innerHTML = '<span class="status-dot"></span><span>online</span>';
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

let pendingMessages = [];
let debounceTimer = null;

function setLoading(loading) {
  isWaiting = loading;
  if (loading) {
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="10" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="31.4 31.4"><animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1s" keyTimes="0;1" values="0 12 12;360 12 12"/></circle></svg>';
  } else {
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'user');
  
  pendingMessages.push(text);

  if (debounceTimer) clearTimeout(debounceTimer);
  
  statusBar.innerHTML = '<span style="color:#8696a0; font-size:12px;">(aguardando mensagens...)</span>';

  debounceTimer = setTimeout(async () => {
    const combinedText = pendingMessages.join('. ');
    pendingMessages = [];
    
    setLoading(true);
    statusBar.innerHTML = '<span class="status-dot"></span><span>online</span>';
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: combinedText, sessionId })
      });

      const data = await res.json();
      hideTyping();
      
      let msgs = data.reply.split(/\||\n/).map(m => m.trim()).filter(m => m.length > 0);
      if (msgs.length === 0) msgs = [data.reply];
      
      for (const msg of msgs) {
        showTyping();
        const delay = Math.min(Math.max(msg.length * 40, 800), 3000); 
        await new Promise(r => setTimeout(r, delay));
        hideTyping();
        addMessage(msg, 'bot');
        await new Promise(r => setTimeout(r, 400));
      }
      
    } catch (err) {
      hideTyping();
      addMessage('Ops, tive um probleminha de conexao. Tenta de novo?', 'bot');
    }

    setLoading(false);
  }, 10000);
}

function sendQuick(text) {
  input.value = text;
  sendMessage();
}

// Mensagem inicial automatica da Bia
async function initChat() {
  await new Promise(r => setTimeout(r, 800));
  showTyping();
  await new Promise(r => setTimeout(r, 1200));
  hideTyping();
  addMessage('Oi!', 'bot');
  
  await new Promise(r => setTimeout(r, 400));
  showTyping();
  await new Promise(r => setTimeout(r, 1500));
  hideTyping();
  addMessage('Aqui e a Camila, da recepcao da Clinica OdontoPrime.', 'bot');
  
  await new Promise(r => setTimeout(r, 400));
  showTyping();
  await new Promise(r => setTimeout(r, 1200));
  hideTyping();
  addMessage('Qual e o seu nome?', 'bot');
}

initChat();
</script>
</body>
</html>
